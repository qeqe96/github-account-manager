<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Account Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <i class="fab fa-github"></i>
                <span>Github Account Manager</span>
            </div>
            <div class="header-stats">
                <div class="stat-pill">
                    <span class="stat-num" id="stat-total">0</span>
                    <span class="stat-label">Toplam</span>
                </div>
                <div class="stat-pill active">
                    <span class="stat-num" id="stat-active">0</span>
                    <span class="stat-label">Aktif</span>
                </div>
                <div class="stat-pill verify">
                    <span class="stat-num" id="stat-verify">0</span>
                    <span class="stat-label">Doğrulanacak</span>
                </div>
                <div class="stat-pill verified">
                    <span class="stat-num" id="stat-verified">0</span>
                    <span class="stat-label">Onaylanan</span>
                </div>
                <div class="stat-pill sold">
                    <span class="stat-num" id="stat-sold">0</span>
                    <span class="stat-label">Satılan</span>
                </div>
            </div>
            <button class="btn-add" onclick="openModal()">
                <i class="fas fa-plus"></i>
                Yeni Hesap
            </button>
        </header>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="tabs">
                <button class="tab-btn active" data-tab="all">Tümü</button>
                <button class="tab-btn" data-tab="active">Aktif</button>
                <button class="tab-btn" data-tab="verify">Doğrulanacak</button>
                <button class="tab-btn" data-tab="verified">Onaylanan</button>
                <button class="tab-btn" data-tab="sold">Satılan</button>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Ara...">
            </div>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Hesap</th>
                        <th>Şifre</th>
                        <th>2FA Key</th>
                        <th>Tarih</th>
                        <th>Kalan</th>
                        <th>Durum</th>
                        <th>Not</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <!-- Footer -->
        <div class="footer-bar">
            <span id="showing-count">0</span> hesap gösteriliyor
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Yeni Hesap Ekle</h3>
                <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="add-account-form">
                <div class="form-group">
                    <label>E-posta</label>
                    <input type="text" id="acc-email" placeholder="ornek@mail.com" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <div class="input-row">
                        <input type="text" id="acc-password" placeholder="Şifre" required>
                        <button type="button" class="btn-input" onclick="setFixedPassword()" title="Sabit şifre"><i
                                class="fas fa-key"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label>2FA Key</label>
                    <input type="text" id="acc-2fa" placeholder="2FA Secret Key">
                </div>
                <div class="form-group">
                    <label>Not</label>
                    <input type="text" id="acc-note" placeholder="Opsiyonel not">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">İptal</button>
                    <button type="submit" class="btn-primary">Ekle</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
