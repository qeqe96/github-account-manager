services:
  - type: web
    name: github-account-manager
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: github-accounts-db
          property: connectionString

databases:
  - name: github-accounts-db
    databaseName: github_accounts
    user: github_accounts_user
    plan: free
